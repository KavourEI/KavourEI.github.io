<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Sora:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body { margin: 0; }
  @keyframes floatOrb { 0%,100% { transform: translate(0,0) scale(1); } 33% { transform: translate(4vw,3vh) scale(1.08); } 66% { transform: translate(-3vw,2vh) scale(.95); } }
  @keyframes gridDrift { from { background-position: 0 0; } to { background-position: 0 60px; } }
  @keyframes pulseDot { 0%,100% { box-shadow: 0 0 0 0 var(--accent-ring, rgba(74,222,128,.45)); } 50% { box-shadow: 0 0 0 8px rgba(74,222,128,0); } }
  @keyframes shimmer { from { background-position: -200% 0; } to { background-position: 200% 0; } }
  @keyframes blink { 0%,49% { opacity:1; } 50%,100% { opacity:0; } }
</style>
</helmet>
<div ref="{{ root }}" style="{{ themeVars }}; --accent:#4ade80; min-height:100vh; background:var(--bg,#0a0e1a); color:var(--text,#e8edf5); font-family:'Sora',system-ui,sans-serif; position:relative; overflow-x:hidden; transition:background .5s ease, color .5s ease;">

  <!-- ambient background -->
  <div style="position:fixed; inset:0; pointer-events:none; z-index:0; opacity:var(--grid-op,.5);">
    <div style="position:absolute; inset:0; background-image:linear-gradient(var(--line,rgba(255,255,255,.06)) 1px, transparent 1px), linear-gradient(90deg, var(--line,rgba(255,255,255,.06)) 1px, transparent 1px); background-size:60px 60px; animation:gridDrift 12s linear infinite; mask-image:radial-gradient(ellipse 80% 60% at 50% 0%, #000 30%, transparent 80%); -webkit-mask-image:radial-gradient(ellipse 80% 60% at 50% 0%, #000 30%, transparent 80%);"></div>
    <div style="position:absolute; top:-10%; left:-5%; width:45vw; height:45vw; border-radius:50%; background:radial-gradient(circle, rgba(74,222,128,var(--orb-a,.18)), transparent 70%); filter:blur(40px); animation:floatOrb 22s ease-in-out infinite;"></div>
    <div style="position:absolute; top:20%; right:-10%; width:40vw; height:40vw; border-radius:50%; background:radial-gradient(circle, rgba(34,211,238,var(--orb-b,.12)), transparent 70%); filter:blur(50px); animation:floatOrb 28s ease-in-out infinite reverse;"></div>
  </div>

  <div style="position:relative; z-index:1; max-width:1080px; margin:0 auto; padding:0 28px;">

    <!-- top bar -->
    <div style="display:flex; align-items:center; justify-content:space-between; padding:26px 0 0;">
      <!-- <div style="font-family:'JetBrains Mono',monospace; font-size:13px; letter-spacing:.18em; color:var(--muted,#8b95a7);">TK<span style="color:var(--accent);">_</span>CV</div> -->
      <div style="font-family:'JetBrains Mono',monospace; font-size:13px; letter-spacing:.18em; color:var(--muted,#8b95a7);">The<span style="color:var(--accent);"> quite </span> side of <span style="color:var(--accent);">Building</span>.<span style="color:var(--accent); animation:blink 1.2s step-end infinite;">_</span></div>
      <div style="display:flex; align-items:center; gap:10px;">
      <a href="projects.html" style="text-decoration:none; display:flex; align-items:center; gap:7px; background:var(--surface,rgba(255,255,255,.04)); border:1px solid var(--border,rgba(255,255,255,.1)); color:var(--text,#e8edf5); border-radius:100px; padding:8px 16px; font-family:'JetBrains Mono',monospace; font-size:12px; letter-spacing:.1em; transition:all .3s ease;" style-hover="border-color:var(--accent); color:var(--accent);">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7h6l2 2h10v10a2 2 0 0 1-2 2H3z"/></svg>PROJECTS
      </a>
      <button onClick="{{ toggleTheme }}" aria-label="Toggle theme" style="cursor:pointer; display:flex; align-items:center; gap:8px; background:var(--surface,rgba(255,255,255,.04)); border:1px solid var(--border,rgba(255,255,255,.1)); color:var(--text,#e8edf5); border-radius:100px; padding:8px 14px; font-family:'JetBrains Mono',monospace; font-size:12px; letter-spacing:.1em; transition:all .3s ease;" style-hover="border-color:var(--accent); color:var(--accent);">
        <sc-if value="{{ isDark }}" hint-placeholder-val="{{ true }}">
          <span style="display:flex; align-items:center; gap:8px;"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>LIGHT</span>
        </sc-if>
        <sc-if value="{{ isLight }}" hint-placeholder-val="{{ false }}">
          <span style="display:flex; align-items:center; gap:8px;"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>DARK</span>
        </sc-if>
      </button>
      </div>
    </div>

    <!-- HEADER -->
    <header style="display:grid; grid-template-columns:260px 1fr; gap:44px; align-items:center; padding:60px 0 44px;">
      <div style="position:relative;">
        <div style="position:absolute; inset:-10px; border-radius:24px; background:linear-gradient(135deg, rgba(74,222,128,.5), rgba(34,211,238,.3), transparent); filter:blur(18px); opacity:.7;"></div>
        <div style="position:relative; padding:6px; border-radius:22px; background:linear-gradient(135deg, var(--accent), rgba(34,211,238,.6));">
          <x-import component-from-global-scope="image-slot" from="./image-slot.js" id="tk-photo" shape="rounded" radius="16" placeholder="Drop your photo" src="img/personal_phot/pers_photo.jpg" hint-size="248px,347px" dc-props="{{ photoSlotProps }}"></x-import>
        </div>
      </div>

      <div>
        <div style="font-family:'JetBrains Mono',monospace; font-size:13px; letter-spacing:.2em; color:var(--accent); margin-bottom:14px; display:flex; align-items:center; gap:10px;">
          <span style="width:26px; height:1px; background:var(--accent); display:inline-block;"></span>LEAD AI / ML ENGINEER
        </div>
        <h1 style="font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:clamp(40px,6vw,68px); line-height:1.02; margin:0 0 20px; letter-spacing:-.02em; background:linear-gradient(120deg, var(--text,#e8edf5) 30%, var(--accent) 130%); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;">Themis Kavour</h1>
        <p style="font-size:17px; line-height:1.7; color:var(--muted,#8b95a7); max-width:560px; margin:0 0 26px; text-wrap:pretty;">{{ intro }}</p>

        <div style="display:flex; flex-wrap:wrap; align-items:center; gap:12px;">
          <a href="#" onClick="{{ downloadCV }}" style="display:inline-flex; align-items:center; gap:9px; background:var(--accent); color:#04120a; font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:14px; text-decoration:none; padding:12px 20px; border-radius:100px; letter-spacing:.01em; transition:transform .25s ease, box-shadow .25s ease; box-shadow:0 8px 24px -8px var(--accent);" style-hover="transform:translateY(-2px); box-shadow:0 14px 30px -8px var(--accent);">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12M7 10l5 5 5-5M5 21h14"/></svg>Download CV
          </a>
          <a href="https://github.com/KavourEI" target="_blank" aria-label="GitHub" style="display:flex; align-items:center; justify-content:center; width:44px; height:44px; border-radius:100px; background:var(--surface,rgba(255,255,255,.04)); border:1px solid var(--border,rgba(255,255,255,.1)); color:var(--text,#e8edf5); transition:all .3s ease;" style-hover="border-color:var(--accent); color:var(--accent); transform:translateY(-2px);">
            <svg width="19" height="19" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.58 2 12.25c0 4.53 2.87 8.37 6.84 9.73.5.1.68-.22.68-.49l-.01-1.7c-2.78.62-3.37-1.37-3.37-1.37-.46-1.18-1.11-1.5-1.11-1.5-.9-.63.07-.62.07-.62 1 .07 1.53 1.06 1.53 1.06.89 1.56 2.34 1.11 2.91.85.09-.66.35-1.11.63-1.36-2.22-.26-4.56-1.14-4.56-5.07 0-1.12.39-2.03 1.03-2.75-.1-.26-.45-1.3.1-2.7 0 0 .84-.28 2.75 1.05a9.34 9.34 0 0 1 5 0c1.91-1.33 2.75-1.05 2.75-1.05.55 1.4.2 2.44.1 2.7.64.72 1.03 1.63 1.03 2.75 0 3.94-2.34 4.8-4.57 5.06.36.32.68.94.68 1.9l-.01 2.82c0 .27.18.59.69.49A10.02 10.02 0 0 0 22 12.25C22 6.58 17.52 2 12 2z"/></svg>
          </a>
          <a href="https://www.linkedin.com/in/themis-kavour/" target="_blank" aria-label="LinkedIn" style="display:flex; align-items:center; justify-content:center; width:44px; height:44px; border-radius:100px; background:var(--surface,rgba(255,255,255,.04)); border:1px solid var(--border,rgba(255,255,255,.1)); color:var(--text,#e8edf5); transition:all .3s ease;" style-hover="border-color:var(--accent); color:var(--accent); transform:translateY(-2px);">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M4.98 3.5a2.5 2.5 0 1 1 0 5 2.5 2.5 0 0 1 0-5zM3 9h4v12H3zM9 9h3.8v1.7h.05c.53-1 1.83-2.05 3.77-2.05 4.03 0 4.78 2.65 4.78 6.1V21h-4v-5.3c0-1.27-.02-2.9-1.77-2.9s-2.04 1.38-2.04 2.8V21H9z"/></svg>
          </a>
          <a href="mailto:themis.kavour@icloud.com" aria-label="Email" style="display:flex; align-items:center; justify-content:center; width:44px; height:44px; border-radius:100px; background:var(--surface,rgba(255,255,255,.04)); border:1px solid var(--border,rgba(255,255,255,.1)); color:var(--text,#e8edf5); transition:all .3s ease;" style-hover="border-color:var(--accent); color:var(--accent); transform:translateY(-2px);">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 6 9-6"/></svg>
          </a>
        </div>
      </div>
    </header>

    <!-- TIMELINE -->
    <section style="padding:20px 0 40px;">
      <div style="display:flex; align-items:center; gap:16px; margin-bottom:40px;">
        <span style="font-family:'JetBrains Mono',monospace; font-size:13px; letter-spacing:.2em; color:var(--accent);">01</span>
        <h2 style="font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:26px; margin:0; letter-spacing:-.01em;">Journey</h2>
        <span style="flex:1; height:1px; background:linear-gradient(90deg, var(--border,rgba(255,255,255,.14)), transparent);"></span>
      </div>

      <div ref="{{ rail }}" style="position:relative; padding-left:60px;">
        <!-- dotted static line -->
        <div style="position:absolute; left:23px; top:6px; bottom:6px; width:2px; background-image:linear-gradient(var(--line-strong,rgba(255,255,255,.22)) 0 6px, transparent 6px 12px); background-size:2px 12px;"></div>
        <!-- animated accent progress line -->
        <div ref="{{ progress }}" style="position:absolute; left:22px; top:6px; height:0px; width:4px; border-radius:4px; background:linear-gradient(var(--accent), rgba(34,211,238,.9)); box-shadow:0 0 16px 2px rgba(74,222,128,.55); transition:height .15s linear;"></div>

        <div style="display:flex; flex-direction:column; gap:44px;">
          <sc-for list="{{ milestones }}" as="m" hint-placeholder-count="6">
            <div data-tl-item style="opacity:0; transform:translateY(24px); transition:opacity .7s ease, transform .7s ease; position:relative;">
              <!-- big dot -->
              <div data-tl-dot style="position:absolute; left:-49px; top:4px; width:20px; height:20px; border-radius:50%; background:var(--bg,#0a0e1a); border:2px solid var(--dot-idle,rgba(255,255,255,.28)); display:flex; align-items:center; justify-content:center; transition:all .4s ease;">
                <div data-tl-core style="width:7px; height:7px; border-radius:50%; background:var(--dot-idle,rgba(255,255,255,.28)); transition:all .4s ease;"></div>
              </div>
              <div data-tl-card style="background:var(--card,rgba(255,255,255,.03)); border:1px solid var(--border,rgba(255,255,255,.1)); border-radius:16px; padding:22px 24px; transition:border-color .3s ease, box-shadow .3s ease, transform .3s ease;" style-hover="border-color:var(--accent); box-shadow:0 16px 40px -18px var(--accent); transform:translateY(-3px);">
                <div style="display:flex; align-items:center; gap:12px; margin-bottom:10px; flex-wrap:wrap;">
                  <span style="font-family:'JetBrains Mono',monospace; font-weight:600; font-size:13px; color:var(--accent); background:var(--accent-dim,rgba(74,222,128,.14)); padding:4px 10px; border-radius:6px; letter-spacing:.05em;">{{ m.year }}</span>
                  <span style="font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:.16em; color:var(--muted,#8b95a7); border:1px solid var(--border,rgba(255,255,255,.14)); padding:3px 8px; border-radius:5px;">{{ m.tag }}</span>
                </div>
                <h3 style="font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:20px; margin:0 0 3px; letter-spacing:-.01em;">{{ m.title }}</h3>
                <div style="font-size:13px; color:var(--accent); margin-bottom:10px; font-weight:500;">{{ m.place }}</div>
                <p style="font-size:14.5px; line-height:1.65; color:var(--muted,#8b95a7); margin:0; text-wrap:pretty;">{{ m.desc }}</p>
              </div>
            </div>
          </sc-for>
        </div>
      </div>
    </section>

    <!-- TECH STACK -->
    <section style="padding:36px 0 90px;">
      <div style="display:flex; align-items:center; gap:16px; margin-bottom:36px;">
        <span style="font-family:'JetBrains Mono',monospace; font-size:13px; letter-spacing:.2em; color:var(--accent);">02</span>
        <h2 style="font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:26px; margin:0; letter-spacing:-.01em;">Tech Stack</h2>
        <span style="flex:1; height:1px; background:linear-gradient(90deg, var(--border,rgba(255,255,255,.14)), transparent);"></span>
      </div>
      <div style="display:flex; flex-direction:column; gap:34px;">
        <sc-for list="{{ techCats }}" as="cat" hint-placeholder-count="2">
          <div>
            <div style="display:flex; align-items:center; gap:10px; margin-bottom:16px;">
              <span style="width:6px; height:6px; border-radius:50%; background:var(--accent); box-shadow:0 0 10px 1px rgba(74,222,128,.6);"></span>
              <span style="font-family:'JetBrains Mono',monospace; font-size:12px; letter-spacing:.18em; color:var(--muted,#8b95a7); text-transform:uppercase;">{{ cat.label }}</span>
            </div>
            <div style="display:grid; grid-template-columns:repeat(4, 1fr); gap:16px;">
              <sc-for list="{{ cat.items }}" as="t" hint-placeholder-count="2">
                <div data-stack-card style="opacity:0; transform:translateY(16px); transition:opacity .6s ease, transform .6s ease, border-color .3s ease, box-shadow .3s ease; position:relative; background:var(--card,rgba(255,255,255,.03)); border:1px solid var(--border,rgba(255,255,255,.1)); border-radius:16px; padding:22px 20px; overflow:hidden;" style-hover="border-color:var(--accent); box-shadow:0 12px 30px -12px var(--accent);">
                  <sc-if value="{{ t.icon }}" hint-placeholder-val="{{ true }}">
                    <img src="{{ t.icon }}" alt="{{ t.name }}" style="height:24px; width:auto; margin-bottom:14px; display:block;" />
                  </sc-if>
                  <sc-if value="{{ !t.icon }}" hint-placeholder-val="{{ false }}">
                    <div style="font-family:'JetBrains Mono',monospace; font-size:24px; font-weight:600; color:var(--accent); margin-bottom:14px;">{{ t.glyph }}</div>
                  </sc-if>
                  <div style="font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:18px; margin-bottom:4px;">{{ t.name }}</div>
                  <div style="font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:.14em; color:var(--muted,#8b95a7);">{{ t.role }}</div>
                </div>
              </sc-for>
            </div>
          </div>
        </sc-for>
      </div>
    </section>

    <footer style="padding:0 0 60px; text-align:center; font-family:'JetBrains Mono',monospace; font-size:12px; letter-spacing:.14em; color:var(--muted,#8b95a7);">
      DESIGNED &amp; BUILT BY THEMIS KAVOUR<span style="color:var(--accent); animation:blink 1.2s step-end infinite;">_</span>
    </footer>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:&quot;100%&quot;}}">
class Component extends DCLogic {
  state = { theme: 'dark' };

  renderVals() {
    const dark = this.state.theme === 'dark';
    const themeVars = dark
      ? '--bg:#0a0e1a; --text:#e8edf5; --muted:#8b95a7; --surface:rgba(255,255,255,.04); --card:rgba(255,255,255,.035); --border:rgba(255,255,255,.10); --line:rgba(255,255,255,.06); --line-strong:rgba(255,255,255,.22); --accent-dim:rgba(74,222,128,.14); --dot-idle:rgba(255,255,255,.28); --grid-op:.55; --orb-a:.18; --orb-b:.12;'
      : '--bg:#f4f7fb; --text:#0f1a2c; --muted:#5a6576; --surface:rgba(10,20,40,.03); --card:rgba(255,255,255,.75); --border:rgba(10,20,40,.10); --line:rgba(10,20,40,.05); --line-strong:rgba(10,20,40,.20); --accent-dim:rgba(22,163,74,.12); --dot-idle:rgba(10,20,40,.25); --grid-op:.7; --orb-a:.14; --orb-b:.10;';

    return {
      photoSlotProps: { style: { width: '100%', aspectRatio: '5/7', display: 'block', borderRadius: '25px', overflow: 'hidden' } },
      root: (el) => { this.rootEl = el; },
      rail: (el) => { this.railEl = el; },
      progress: (el) => { this.progressEl = el; },
      themeVars,
      isDark: dark,
      isLight: !dark,
      toggleTheme: () => this.setState(s => ({ theme: s.theme === 'dark' ? 'light' : 'dark' })),
      downloadCV: (e) => { e.preventDefault(); alert('Attach your CV file here — hook this button to your PDF.'); },
      intro: 'Results-driven Lead AI/ML Engineer with multiple years of experience designing and productionizing intelligent systems across NLP, LLMs, and full-stack AI. Expert in RAG pipelines, embedding strategies, and end-to-end AI solution lifecycles — driving AI adoption across enterprise and research environments.',
      techCats: [
        { label: 'Programming Languages', items: [
          { icon: 'img/logos/python-logo-only.svg', name: 'Python', role: 'PRIMARY' },
          { icon: 'img/logos/Rlogo.svg', name: 'R', role: 'STATISTICS' },
          { icon: 'img/logos/sql.svg', name: 'SQL', role: 'DATABASE' },
        ] },
        { label: 'Frameworks & Technologies', items: [
          { icon: 'img/logos/pytorch.svg', name: 'PyTorch', role: 'DEEP LEARNING' },
          { icon: 'img/logos/icon-graphdb.svg', name: 'GraphDB', role: 'DATABASE' },
          { icon: 'img/logos/tableau.svg', name: 'Tableau', role: 'VISUALIZATION' },
          { icon: 'img/logos/flutter.svg', name: 'Flutter', role: 'VISUALIZATION' },
          { icon: 'img/logos/firebase.svg', name: 'Firebase DB', role: 'DATABASE' },
          { icon: 'img/logos/latex.svg', name: 'LaTex', role: 'REPORTING' },
        ] },
      ],
      milestones: [
        { year: '2018', tag: 'EDUCATION', title: 'BSc in Mathematics', place: 'Aristotle Unversity of Thessaloniki, Greece', desc: 'Foundations in analysis, probability and linear algebra — where a fascination with data and models first took shape.' },
        { year: '2020', tag: 'EDUCATION', title: 'MSc in Econometrics and Operational Research', place: 'Maastricht University, Netherlands', desc: 'Bayesian inference, statistical learning and experimental design; first hands-on work with predictive modelling.' },
        { year: '2024', tag: 'EXPERIENCE', title: 'Associate Data Scientist', place: 'PricewaterhouseCoopers', desc: 'Built dashboards and forecasting models, turning messy operational data into decisions for product and ops teams.' },
        { year: '2025', tag: 'EDUCATION', title: 'MSc in Applied Statistics', place: 'Athens University of Economics, Greece', desc: 'Deep learning, NLP and reinforcement learning — thesis on transformer-based representation learning.' },
        { year: 'Today', tag: 'EXPERIENCE', title: 'Research Associates', place: 'CERTH, Thessaloniki, Greece', desc: 'Productionized NLP and recommendation systems, owning the full lifecycle from data pipelines to model serving.' },
        { year: 'Today', tag: 'EXPERIENCE', title: 'Lead AI/ML Engineer', place: 'NGL Strategy, Houston Texas, USA', desc: 'Leading RAG pipelines, LLM systems and embedding strategies; driving AI adoption and mentoring a cross-functional team.' },
      ],
    };
  }

  componentDidMount() {
    // reveal on scroll
    const items = [
      ...this.rootEl.querySelectorAll('[data-tl-item]'),
      ...this.rootEl.querySelectorAll('[data-stack-card]'),
    ];
    this._io = new IntersectionObserver((entries) => {
      entries.forEach(en => {
        if (en.isIntersecting) {
          en.target.style.opacity = '1';
          en.target.style.transform = 'translateY(0)';
          this._io.unobserve(en.target);
        }
      });
    }, { threshold: 0.15, rootMargin: '0px 0px -8% 0px' });
    items.forEach((el, i) => {
      el.style.transitionDelay = (i % 4) * 0.06 + 's';
      this._io.observe(el);
    });

    // scroll-driven timeline
    let ticking = false;
    this._onScroll = () => {
      if (ticking) return;
      ticking = true;
      requestAnimationFrame(() => {
        this.updateTimeline();
        ticking = false;
      });
    };
    window.addEventListener('scroll', this._onScroll, { passive: true });
    window.addEventListener('resize', this._onScroll, { passive: true });
    this.updateTimeline();
  }

  updateTimeline() {
    if (!this.railEl || !this.progressEl) return;
    const railRect = this.railEl.getBoundingClientRect();
    const triggerY = window.innerHeight * 0.62;
    const filled = Math.max(0, Math.min(railRect.height - 12, triggerY - railRect.top));
    this.progressEl.style.height = filled + 'px';

    const dots = this.rootEl.querySelectorAll('[data-tl-dot]');
    dots.forEach(dot => {
      const core = dot.querySelector('[data-tl-core]');
      const dotY = dot.getBoundingClientRect().top + 10;
      const reached = dotY <= railRect.top + filled + 6;
      if (reached) {
        dot.style.borderColor = 'var(--accent)';
        dot.style.boxShadow = '0 0 18px 2px rgba(74,222,128,.5)';
        dot.style.transform = 'scale(1.15)';
        if (core) { core.style.background = 'var(--accent)'; core.style.width = '9px'; core.style.height = '9px'; }
      } else {
        dot.style.borderColor = 'var(--dot-idle)';
        dot.style.boxShadow = 'none';
        dot.style.transform = 'scale(1)';
        if (core) { core.style.background = 'var(--dot-idle)'; core.style.width = '7px'; core.style.height = '7px'; }
      }
    });
  }

  componentWillUnmount() {
    if (this._io) this._io.disconnect();
    window.removeEventListener('scroll', this._onScroll);
    window.removeEventListener('resize', this._onScroll);
  }
}
</script>
